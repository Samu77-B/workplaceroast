<script>
// Set current year
document.getElementById('currentYear').textContent = new Date().getFullYear();

// PWA Install Button Functionality
let deferredPrompt;
const installButton = document.getElementById('pwaInstallButton');
const installContainer = document.getElementById('pwaInstallContainer');

// Listen for the beforeinstallprompt event
window.addEventListener('beforeinstallprompt', (e) => {
    // Prevent the mini-infobar from appearing on mobile
    e.preventDefault();
    // Stash the event so it can be triggered later
    deferredPrompt = e;
    // Show the install button
    installContainer.style.display = 'flex';
});

// Handle install button click
installButton.addEventListener('click', async () => {
    if (!deferredPrompt) {
        // If the prompt isn't available, show instructions
        showInstallInstructions();
        return;
    }
    
    // Show the install prompt
    deferredPrompt.prompt();
    
    // Wait for the user to respond to the prompt
    const { outcome } = await deferredPrompt.userChoice;
    
    if (outcome === 'accepted') {
        console.log('User accepted the install prompt');
        installButton.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg><span>Installed!</span>';
        installButton.disabled = true;
    } else {
        console.log('User dismissed the install prompt');
    }
    
    // Clear the deferredPrompt
    deferredPrompt = null;
    installContainer.style.display = 'none';
});

// Hide install button if app is already installed
window.addEventListener('appinstalled', () => {
    console.log('PWA was installed');
    installContainer.style.display = 'none';
    deferredPrompt = null;
});

// Check if app is already installed (standalone mode)
if (window.matchMedia('(display-mode: standalone)').matches || 
    window.navigator.standalone === true) {
    installContainer.style.display = 'none';
}

// Show install instructions for iOS
function showInstallInstructions() {
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    
    if (isIOS) {
        alert('To install this app on your iOS device:\n\n1. Tap the Share button\n2. Tap "Add to Home Screen"\n3. Tap "Add"');
    } else {
        alert('To install this app:\n\nLook for the install icon in your browser\'s address bar, or use the browser menu to "Install App".');
    }
}

// Footer Scroll Behavior - Pin to bottom until user scrolls
(function() {
    const footer = document.querySelector('.app-footer');
    if (!footer) return;
    
    let lastScrollTop = 0;
    let scrollThreshold = 50; // Pixels to scroll before hiding footer
    let ticking = false;
    
    function updateFooterVisibility() {
        const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
        const windowHeight = window.innerHeight;
        const documentHeight = document.documentElement.scrollHeight;
        
        // Check if we're at the bottom of the page
        const isAtBottom = scrollTop + windowHeight >= documentHeight - 10;
        
        // Show footer if:
        // 1. User is at the top of the page (scrollTop < threshold)
        // 2. User is at the bottom of the page
        // 3. User is scrolling up
        if (scrollTop < scrollThreshold || isAtBottom || scrollTop < lastScrollTop) {
            footer.classList.remove('footer-hidden');
            footer.classList.add('footer-visible');
        } else if (scrollTop > lastScrollTop && scrollTop > scrollThreshold && !isAtBottom) {
            // Hide footer when scrolling down
            footer.classList.remove('footer-visible');
            footer.classList.add('footer-hidden');
        }
        
        lastScrollTop = scrollTop <= 0 ? 0 : scrollTop;
        ticking = false;
    }
    
    function requestTick() {
        if (!ticking) {
            window.requestAnimationFrame(updateFooterVisibility);
            ticking = true;
        }
    }
    
    // Listen for scroll events
    window.addEventListener('scroll', requestTick, { passive: true });
    
    // Initial check
    updateFooterVisibility();
    
    // Also check on resize
    window.addEventListener('resize', updateFooterVisibility, { passive: true });
})();
</script>
